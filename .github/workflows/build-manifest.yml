name: Build media manifest

on:
  push:
      branches: [main]
          paths:
                - 'media/**'
                      - 'scripts/build-manifest.js'
                            - '.github/workflows/build-manifest.yml'
                              workflow_dispatch:

                              permissions:
                                contents: write

                                jobs:
                                  build:
                                      runs-on: ubuntu-latest
                                          steps:
                                                - name: Checkout
                                                        uses: actions/checkout@v4
                                                                with:
                                                                          token: ${{ secrets.GITHUB_TOKEN }}

                                                                                - name: Setup Node
                                                                                        uses: actions/setup-node@v4
                                                                                                with:
                                                                                                          node-version: '20'
                                                                                                          
                                                                                                                - name: Generate manifest
                                                                                                                        run: node scripts/build-manifest.js
                                                                                                                        
                                                                                                                              - name: Commit & push if changed
                                                                                                                                      run: |
                                                                                                                                                git config user.name "github-actions[bot]"
                                                                                                                                                          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                    if git diff --quiet media/manifest.json; then
                                                                                                                                                                                echo "No manifest changes."
                                                                                                                                                                                          else
                                                                                                                                                                                                      git add media/manifest.json
                                                                                                                                                                                                                  git commit -m "chore: update media manifest [skip ci]"
                                                                                                                                                                                                                              git push
                                                                                                                                                                                                                                        fi
